name: Daily Finance Brief

on:
  schedule:
    # GitHub Actions uses UTC. 00:00 UTC is 08:00 in Asia/Shanghai.
    - cron: "0 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chinese fonts
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate brief
        run: python src/daily_finance_brief.py

      - name: Commit generated brief
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate daily finance brief"
          file_pattern: output/*
